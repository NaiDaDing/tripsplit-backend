name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Django Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tripsplit_test
          POSTGRES_USER: tripsplit
          POSTGRES_PASSWORD: tripsplit
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U tripsplit -d tripsplit_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: ci-secret-key-for-github-actions-only
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DATABASE_URL: postgres://tripsplit:tripsplit@localhost:5432/tripsplit_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system check
        run: python manage.py check

      - name: Run tests
        run: python manage.py test accounts trips expenses

      - name: Run ruff lint
        run: ruff check .

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tripsplit-backend:ci .
